kind = "web"
previewPath = "/"
title = "Radhe Digital T-Shirt Printing"
version = "1.0.0"
id = "artifacts/radhe-digital"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25718

[services.development]
run = "pnpm --filter @workspace/radhe-digital run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/radhe-digital", "run", "build" ]
publicDir = "artifacts/radhe-digital/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25718"
BASE_PATH = "/"
